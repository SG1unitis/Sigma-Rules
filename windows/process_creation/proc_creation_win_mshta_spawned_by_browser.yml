title: Mshta Spawned By Web Browser
id: 243b59bd-8743-4ba5-94e8-5200b8730e24
status: test
description: Detects mshta.exe spawned by a web browser, which may indicate execution of malicious HTML application content or script proxy execution.
author: TH
date: 2026-05-24
logsource:
  product: windows
  category: process_creation
detection:
  selection_image:
    Image|endswith: '\mshta.exe'
  selection_parent:
    ParentImage|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\firefox.exe'
      - '\iexplore.exe'
      - '\opera.exe'
      - '\brave.exe'
  condition: selection_image and selection_parent
fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
  - CurrentDirectory
falsepositives:
  - Rare legitimate execution of HTA content from a browser
  - Internal legacy applications using HTA files
level: high
tags:
  - attack.defense-evasion
  - attack.t1218.005