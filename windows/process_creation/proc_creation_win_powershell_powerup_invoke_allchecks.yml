title: PowerShell PowerUp Invoke-AllChecks Execution
id: ce283dc8-37e8-406a-9e68-1a92d30c787d
status: test
description: Detects PowerShell execution of PowerUp Invoke-AllChecks, commonly used during Windows privilege escalation enumeration.
author: TH
date: 2026-05-25
logsource:
  product: windows
  category: process_creation
detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_powerup:
    CommandLine|contains|all:
      - 'PowerUp'
      - 'Invoke-AllChecks'
  selection_invoke_expression:
    CommandLine|contains:
      - 'iex'
      - 'Invoke-Expression'
  selection_parent_cmd:
    ParentImage|endswith: '\cmd.exe'
  condition: selection_image and selection_powerup and (selection_invoke_expression or selection_parent_cmd)
fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
  - CurrentDirectory
falsepositives:
  - Authorized internal privilege escalation assessments
  - Red team activity
  - Lab or CTF activity
level: high
tags:
  - attack.execution
  - attack.privilege-escalation
  - attack.discovery
  - attack.t1059.001