title: Suspicious Password Protected Archive Creation With 7-Zip
id: 17edfaaf-4797-42b3-aa07-418c538e5882
status: test
description: Detects 7-Zip creating a password-protected archive with suspicious filenames, paths, or keywords often associated with data staging before exfiltration.
author: TH
date: 2026-06-25
logsource:
  product: windows
  category: process_creation
detection:
  selection_image:
    Image|endswith:
      - '\7z.exe'
      - '\7za.exe'
      - '\7zr.exe'
  selection_archive:
    CommandLine|contains|all:
      - ' a '
      - '-p'
  selection_suspicious_keyword:
    CommandLine|contains:
      - 'exfil'
      - 'loot'
      - 'dump'
      - 'ntds'
      - 'lsass'
      - 'sam'
      - 'system'
      - 'secret'
      - 'confidential'
  selection_suspicious_path:
    CommandLine|contains:
      - '\Temp\'
      - '\AppData\'
      - '\Users\Public\'
      - '\ProgramData\'
  condition: selection_image and selection_archive and 1 of selection_suspicious_*
fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
  - CurrentDirectory
falsepositives:
  - Legitimate encrypted backups
  - Administrative archive creation
  - Internal data transfer workflows
level: high
tags:
  - attack.collection
  - attack.t1560.001